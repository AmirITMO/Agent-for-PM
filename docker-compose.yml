version: '3.8'

services:
  agent3-db:
    image: postgres:16-alpine
    container_name: agent3-db
    environment:
      POSTGRES_DB: agent3_pm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: agent3secure2026
    ports:
      - "5433:5432"
    volumes:
      - agent3_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  agent3-app:
    build: .
    container_name: agent3-app
    depends_on:
      - agent3-db
    env_file: .env
    ports:
      - "8083:8080"
    volumes:
      - agent3_uploads:/app/agent3_pm/uploads
    restart: unless-stopped

volumes:
  agent3_pgdata:
  agent3_uploads:
