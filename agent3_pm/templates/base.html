<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MarketAI Tracker{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; color: #1a1a1a; font-size: 14px; }
        .header { border-bottom: 1px solid #eee; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header nav { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
        .header nav a { color: #666; text-decoration: none; font-size: 13px; }
        .header nav a:hover { color: #000; }
        .header nav a.active { color: #000; font-weight: 600; }
        .nav-sep { color: #e5e5e5; }

        .kanban-wrap { display: flex; gap: 0; overflow-x: auto; min-height: calc(100vh - 95px); }
        .kanban-col { min-width: 210px; max-width: 230px; flex-shrink: 0; border-right: 1px solid #f0f0f0; }
        .col-head { padding: 14px 16px 8px; display: flex; align-items: center; gap: 6px; }
        .col-title { font-size: 12px; font-weight: 700; }
        .col-count { font-size: 12px; color: #999; }
        .col-body { padding: 0 8px 8px; }

        .card { background: #fff; border: 1px solid #f0f0f0; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; position: relative; }
        .card:hover { border-color: #ddd; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .card-priority { position: absolute; left: -1px; top: 12px; width: 4px; height: 16px; border-radius: 0 2px 2px 0; background: #e74c3c; }
        .card-title { font-size: 13px; font-weight: 500; line-height: 1.35; }
        .card-title a { color: inherit; text-decoration: none; }
        .card-desc { font-size: 11px; color: #999; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
        .card-hours { font-size: 11px; color: #888; }
        .card-due { font-size: 10px; padding: 1px 5px; border-radius: 3px; }
        .card-due-overdue { background: #fde8e8; color: #c62828; }
        .card-due-normal { color: #888; }
        .card-avatar { position: absolute; top: 8px; right: 8px; width: 22px; height: 22px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; color: #777; }
        .tag-pr { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: #f0f0f0; color: #777; }
        .tag-bug { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: #fde8e8; color: #c62828; font-weight: 600; }

        .add-task { padding: 8px 16px; font-size: 12px; color: #999; cursor: pointer; }
        .add-task:hover { color: #333; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 24px; max-width: 460px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal h2 { font-size: 16px; margin-bottom: 16px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 3px; color: #555; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 7px 9px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; }
        .form-group textarea { height: 60px; resize: vertical; }
        .checkbox-row { display: flex; align-items: center; gap: 6px; }
        .checkbox-row input { width: auto; }
        .btn { padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
        .btn-primary { background: #1a1a1a; color: #fff; }
        .btn-primary:hover { background: #333; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-green { background: #16a34a; color: #fff; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }

        table.list { width: 100%; border-collapse: collapse; background: #fff; }
        table.list th { background: #f7f7f7; text-align: left; padding: 10px 14px; font-size: 12px; color: #555; font-weight: 600; }
        table.list td { padding: 10px 14px; font-size: 13px; border-top: 1px solid #f0f0f0; }
        .badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; }
        .members-bar { padding: 8px 24px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 8px; font-size: 12px; color: #666; flex-wrap: wrap; }
        .member-chip { background: #f0f0f0; padding: 2px 8px; border-radius: 12px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>{% block header_title %}MarketAI Tracker{% endblock %}</h1>
        <nav>{% block nav %}{% endblock %}</nav>
    </div>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
