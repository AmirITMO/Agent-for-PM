<!-- Add Task Modal -->
<div id="addModal" class="modal-overlay">
    <div class="modal">
        <h2>Новая задача</h2>
        <form id="addForm" method="post" action="/api/tasks">
            <input type="hidden" name="project_id">
            <input type="hidden" name="status" value="backlog">
            <input type="hidden" name="redirect" value="/board">
            <div class="form-group">
                <label>Название</label>
                <input type="text" name="title" required>
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea name="description"></textarea>
            </div>
            <div class="form-group">
                <label>Исполнитель</label>
                <select name="assignee_id">
                    <option value="">не назначен</option>
                    {% for u in users %}<option value="{{ u.id }}">{{ u.name }}{% if u.position %} — {{ u.position }}{% endif %}</option>{% endfor %}
                </select>
            </div>
            <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1">
                    <label>Приоритет</label>
                    <select name="priority">
                        {% for p in priorities %}<option value="{{ p }}" {% if p == default_priority %}selected{% endif %}>{{ priority_label[p] }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group" style="flex:1">
                    <label>Оценка (часы)</label>
                    <input type="number" name="estimated_hours" step="0.25" min="0">
                </div>
            </div>
            <div class="form-group checkbox-row">
                <input type="checkbox" name="is_bug" value="1" id="addBug">
                <label for="addBug" style="margin:0;">Баг (красная метка)</label>
            </div>
            <div class="form-group">
                <label>Дедлайн (необязательно)</label>
                <input type="date" name="due_date">
            </div>
            <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:14px;">
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('addModal').classList.remove('active')">Отмена</button>
                <button type="submit" class="btn btn-primary">Создать</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Task Modal -->
<div id="editModal" class="modal-overlay">
    <div class="modal" style="width:520px; max-width:92vw;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
            <h2 style="margin:0;">Задача</h2>
            <a id="eShare" href="#" style="font-size:12px; color:#1565c0; text-decoration:none;">Открыть страницу / поделиться</a>
        </div>
        <form id="editForm" method="post">
            <input type="hidden" name="redirect" value="/board">
            <input type="hidden" name="project_id">
            <div class="form-group">
                <label>Название</label>
                <input type="text" name="title" required>
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea name="description"></textarea>
            </div>
            <div class="form-group">
                <label>Исполнитель</label>
                <select name="assignee_id">
                    <option value="">не назначен</option>
                    {% for u in users %}<option value="{{ u.id }}">{{ u.name }}{% if u.position %} — {{ u.position }}{% endif %}</option>{% endfor %}
                </select>
            </div>
            <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1">
                    <label>Приоритет</label>
                    <select name="priority">
                        {% for p in priorities %}<option value="{{ p }}">{{ priority_label[p] }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group" style="flex:1">
                    <label>Оценка (часы)</label>
                    <input type="number" name="estimated_hours" step="0.25" min="0">
                </div>
            </div>
            <div class="form-group checkbox-row">
                <input type="checkbox" name="is_bug" value="1" id="editBug">
                <label for="editBug" style="margin:0;">Баг (красная метка)</label>
            </div>
            <div class="form-group">
                <label>Дедлайн</label>
                <input type="date" name="due_date">
            </div>
            <div style="display:flex; gap:10px; justify-content:space-between; margin-top:16px;">
                <button type="button" id="doneBtn" class="btn btn-green" style="display:none;" onclick="submitDone()">Выполнено</button>
                <div style="display:flex; gap:10px; margin-left:auto;">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('editModal').classList.remove('active')">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </div>
        </form>
        <form id="doneForm" method="post"><input type="hidden" name="redirect" value="/board"></form>
    </div>
</div>
